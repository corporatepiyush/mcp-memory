[package]
name = "mcp-memory"
version = "0.1.0"
edition = "2024"
authors = ["Piyush"]
description = "MCP server for knowledge graph memory — entities, relations, and observations persisted via custom binary log"
license = "MIT"
repository = "https://github.com/corporatepiyush/mcp-memory"
readme = "README.md"
keywords = ["mcp", "knowledge-graph", "memory", "llm", "agent"]
categories = ["database-implementations", "command-line-utilities"]
exclude = ["/target", "OPTIMIZATION_PLAN.md", "*.bin"]

[dependencies]
tokio = { version = "1.41", features = ["macros", "rt-multi-thread", "io-std", "io-util", "sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
thiserror = "1.0"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
ahash = "0.8"

[dev-dependencies]
rand = { version = "0.8", features = ["small_rng"] }

[[bin]]
name = "mcp-memory"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[lints.clippy]
large_stack_frames = "warn"
large_enum_variant = "warn"
boxed_local = "warn"
box_collection = "warn"
redundant_clone = "warn"
needless_pass_by_value = "warn"
trivially_copy_pass_by_ref = "warn"
unnecessary_to_owned = "warn"
implicit_clone = "warn"
iter_overeager_cloned = "warn"
ptr_arg = "warn"
missing_const_for_fn = "warn"
cast_lossless = "warn"
unnecessary_cast = "warn"
vec_init_then_push = "warn"
string_add_assign = "warn"
inefficient_to_string = "warn"
manual_memcpy = "warn"
useless_vec = "warn"
slow_vector_initialization = "warn"
manual_find_map = "warn"
manual_filter_map = "warn"
mutex_atomic = "warn"
option_option = "warn"
